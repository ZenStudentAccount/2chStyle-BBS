services:
  - type: web
    name: 2chstyle-bbs
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/app/data/dev.db
    disk:
      name: sqlite-db
      mountPath: /app/data
      sizeGB: 1
